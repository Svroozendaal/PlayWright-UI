appId: com.pwstudio.app
productName: PW Studio
directories:
  output: dist
win:
  target:
    - target: nsis
    - target: portable
  icon: resources/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
files:
  - "!**/node_modules/better-sqlite3/build/Release/obj/**"
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/keytar/**"
extraResources:
  - from: sample-project
    to: sample-project
    filter:
      - "**/*"
      - "!node_modules/**"
